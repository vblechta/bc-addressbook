<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přihlášení</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📞</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

.login-container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    padding: 50px;
    width: 100%;
    max-width: 420px;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.login-header h1 {
    color: #1a1a1a;
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.login-header p {
    color: #6b7280;
    font-size: 14px;
    font-weight: 500;
}

.form-control {
    padding: 14px 18px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 15px;
    font-weight: 500;
    background-color: #f9fafb;
    transition: all 0.3s ease;
}

.form-control::placeholder {
    color: #9ca3af;
    font-weight: 400;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    background-color: white;
}

.btn-login {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    padding: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    color: white;
    border-radius: 10px;
    font-size: 15px;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    color: white;
}

.btn-login:active {
    transform: translateY(0);
}

.error-message {
    display: none;
    color: #991b1b;
    font-size: 14px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #fef2f2;
    border-left: 4px solid #dc3545;
    border-radius: 8px;
    font-weight: 500;
}

.error-message.show {
    display: block;
    animation: slideDown 0.3s ease;
}

    @media (max-width: 767.98px) {
        .login-container {
            width: calc(100% - 32px);
            max-width: 100%;
            padding: 32px 22px;
            margin: 16px;
        }

        .login-header h1 {
            font-size: 24px;
        }

        .form-control {
            padding: 12px 14px;
            font-size: 14px;
        }

        .btn-login {
            padding: 13px;
            font-size: 14px;
        }
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1><i class="fas fa-phone me-2"></i>Kontaktní seznam</h1>
        <p>Administrace telefonního seznamu</p>
    </div>

    {% if error %}
    <div class="error-message show"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="text" class="form-control" name="username" placeholder="Uživatelské jméno" required autocomplete="username">
        <input type="password" class="form-control" name="password" placeholder="Heslo" required autocomplete="current-password">
        <button type="submit" class="btn btn-login w-100"><i class="fas fa-sign-in-alt me-2"></i>Přihlásit se</button>
    </form>
    <a href="/" class="btn btn-link text-secondary w-100 mt-3"></i>Zpět na telefonní seznam</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
